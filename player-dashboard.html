<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>申込状況ダッシュボード</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff;
    --bg-subtle: #f5f6f8;
    --card: var(--bg);
    --primary: #2456e6;
    --primary-strong: #1d4fd7;
    --primary-weak: #eaf0ff;
    --accent-line: #2563eb;
    --text: #0f172a;
    --text-sub: #64748b;
    --text-faint: #94a3b8;
    --text-muted: #667085;
    --border: #e2e8f0;
    --disabled: #cbd5e1;
    --required: #d11f3a;
    --success: #166534;
    --success-bg: #dcfce7;
    --success-border: #86efac;
    --error: #dc2626;
    --error-bg: #fee2e2;
    --warning-bg: #fef3c7;
    --warning-text: var(--text);
    --bg-muted: var(--bg-subtle);
    --bg-surface: var(--bg-subtle);
    --icon-muted: var(--text-sub);
    --radius-card: 14px;
    --radius-control: 10px;
    --radius-pill: 999px;
    --space-1: 4px;
    --space-2: 8px;
    --space-3: 12px;
    --space-4: 16px;
    --space-5: 20px;
    --space-6: 24px;
    --space-7: 28px;
    --space-8: 32px;
    --shadow-card: 0 1px 2px rgba(15, 23, 42, 0.06);
    --shadow-focus: 0 0 0 3px rgba(37, 99, 235, 0.16);
    --muted: var(--text-sub);
    --muted-bg: var(--bg-subtle);
  }
  .en-sub {
    font-size: 12px;
    color: var(--text-sub);
    display: block;
    font-weight: 500;
    margin-top: var(--space-1);
    overflow-wrap: anywhere;
  }
  body {
    font-family: 'Noto Sans JP', 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', sans-serif;
    background: var(--bg-subtle);
    color: var(--text);
    font-size: 16px;
    min-height: 100vh;
    padding-bottom: calc(76px + env(safe-area-inset-bottom));
    overflow-x: hidden;
    -webkit-tap-highlight-color: transparent;
    line-break: strict;
    overflow-wrap: break-word;
    word-break: keep-all;
  }
  button, label, input, select, textarea { touch-action: manipulation; }
  header {
    background: var(--bg);
    color: var(--text);
    padding: var(--space-4) var(--space-4) var(--space-3);
    position: sticky;
    top: 0;
    z-index: 10;
    border-bottom: 1px solid var(--border);
  }
  .header-inner {
    max-width: 720px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: var(--space-3);
  }
  .header-copy {
    flex: 1;
    min-width: 0;
    text-align: center;
  }
  header h1 {
    font-size: 18px;
    line-height: 1.4;
    font-weight: 700;
  }
  .header-sub {
    font-size: 13px;
    color: var(--text-sub);
    font-weight: 500;
    margin-top: var(--space-1);
    overflow-wrap: anywhere;
  }
  .header-actions {
    display: flex;
    align-items: center;
    gap: var(--space-2);
  }
  .lang-btn,
  .btn-logout {
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font-size: 12px;
    font-weight: 700;
    padding: 0 var(--space-3);
    border-radius: var(--radius-pill);
    cursor: pointer;
    min-height: 44px;
    white-space: nowrap;
    font-family: inherit;
  }
  .lang-btn {
    color: var(--accent-line);
  }
  .btn-logout {
    background: var(--bg-subtle);
  }
  .container {
    max-width: 720px;
    margin: 0 auto;
    padding: var(--space-5) var(--space-4) var(--space-8);
  }
  .top-shell {
    display: flex;
    flex-direction: column;
    gap: var(--space-4);
    margin-bottom: var(--space-5);
  }
  .card {
    background: var(--card);
    border-radius: var(--radius-card);
    border: 1px solid var(--border);
    box-shadow: var(--shadow-card);
    padding: var(--space-5);
  }
  .section-eyebrow {
    font-size: 12px;
    font-weight: 700;
    color: var(--text-sub);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: var(--space-2);
  }
  .section-title {
    font-size: 26px;
    line-height: 1.3;
    font-weight: 700;
    color: var(--text);
    margin-bottom: var(--space-3);
  }
  .section-description {
    font-size: 15px;
    line-height: 1.7;
    font-weight: 500;
    color: var(--text-sub);
  }
  .summary-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: var(--space-3);
  }
  .summary-card {
    background: var(--card);
    border-radius: var(--radius-card);
    border: 1px solid var(--border);
    box-shadow: var(--shadow-card);
    padding: var(--space-4);
  }
  .summary-card .num {
    font-size: 28px;
    line-height: 1.15;
    font-weight: 700;
    color: var(--text);
  }
  .summary-card .lbl {
    font-size: 13px;
    color: var(--text-sub);
    margin-top: var(--space-2);
    line-height: 1.5;
    font-weight: 600;
  }
  .num-pending { color: var(--warning-text); }
  .num-confirmed { color: var(--success); }
  .num-rejected { color: var(--error); }
  .num-total { color: var(--primary); }
  .filter-bar {
    display: flex;
    gap: var(--space-2);
    overflow-x: auto;
    padding-bottom: var(--space-1);
    scrollbar-width: none;
  }
  .filter-bar::-webkit-scrollbar { display: none; }
  .filter-btn {
    padding: 0 var(--space-4);
    font-size: 13px;
    font-weight: 600;
    border: 1px solid var(--border);
    border-radius: var(--radius-pill);
    background: transparent;
    color: var(--text-sub);
    cursor: pointer;
    min-height: 44px;
    flex: 0 0 auto;
    transition: border-color 0.15s, background-color 0.15s, color 0.15s;
  }
  .filter-btn.active {
    background: var(--primary);
    border-color: var(--primary);
    color: var(--bg);
  }
  .game-list {
    display: flex;
    flex-direction: column;
    gap: var(--space-3);
  }
  .game-card {
    background: var(--card);
    border-radius: var(--radius-card);
    border: 1px solid var(--border);
    box-shadow: var(--shadow-card);
    overflow: hidden;
  }
  .game-card-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    padding: var(--space-4);
    cursor: pointer;
    gap: var(--space-3);
    min-height: 44px;
  }
  .game-info { flex: 1; min-width: 0; }
  .game-date {
    font-size: 13px;
    line-height: 1.6;
    color: var(--text-sub);
    font-weight: 600;
  }
  .game-title {
    font-size: 18px;
    line-height: 1.45;
    font-weight: 700;
    color: var(--text);
    margin-top: var(--space-1);
    overflow-wrap: anywhere;
  }
  .game-deadline {
    font-size: 13px;
    line-height: 1.6;
    color: var(--text-sub);
    margin-top: var(--space-2);
    font-weight: 500;
  }
  .badge {
    flex-shrink: 0;
    display: inline-flex;
    align-items: center;
    gap: var(--space-1);
    font-size: 12px;
    font-weight: 700;
    padding: 6px 10px;
    border-radius: var(--radius-pill);
    white-space: nowrap;
  }
  .badge-none {
    background: var(--bg-subtle);
    color: var(--text-sub);
    border: 1px solid var(--border);
  }
  .badge-pending { background: var(--warning-bg); color: var(--warning-text); }
  .badge-confirmed { background: var(--success-bg); color: var(--success); }
  .badge-rejected,
  .badge-closed { background: var(--error-bg); color: var(--error); }
  .game-card-detail {
    display: none;
    border-top: 1px solid var(--border);
    padding: var(--space-4);
    background: var(--bg);
  }
  .game-card.open .game-card-detail { display: block; }
  .detail-row {
    display: flex;
    gap: var(--space-3);
    font-size: 14px;
    margin-bottom: var(--space-2);
    align-items: flex-start;
    line-height: 1.65;
  }
  .detail-label {
    color: var(--text-sub);
    min-width: 84px;
    flex-shrink: 0;
    font-weight: 600;
  }
  .detail-value { color: var(--text); font-weight: 600; }
  .detail-value-muted {
    font-size: 12px;
    color: var(--text-sub);
    font-weight: 500;
  }
  .detail-actions {
    display: flex;
    gap: var(--space-3);
    margin-top: var(--space-4);
    flex-wrap: wrap;
  }
  .detail-actions.is-standalone {
    margin-top: 0;
  }
  .btn-edit,
  .btn-cancel,
  .btn-apply {
    flex: 1;
    min-width: 120px;
    min-height: 48px;
    padding: 0 var(--space-4);
    font-size: 14px;
    font-weight: 700;
    border-radius: var(--radius-control);
    cursor: pointer;
    font-family: inherit;
  }
  .btn-edit {
    border: 1px solid var(--accent-line);
    color: var(--accent-line);
    background: var(--bg);
  }
  .btn-cancel {
    border: 1px solid var(--error);
    color: var(--error);
    background: var(--bg);
  }
  .btn-apply {
    border: 1px solid var(--primary);
    color: var(--bg);
    background: var(--primary);
  }
  .ticket-status-row {
    display: flex;
    gap: var(--space-2);
    flex-wrap: wrap;
    margin-top: var(--space-3);
  }
  .ticket-pill {
    display: inline-flex;
    align-items: center;
    gap: var(--space-2);
    font-size: 12px;
    font-weight: 600;
    padding: 6px 10px;
    border-radius: var(--radius-pill);
    white-space: nowrap;
    min-height: 32px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
  }
  .pill-done,
  .pill-confirmed {
    background: var(--success-bg);
    color: var(--success);
    border-color: transparent;
  }
  .pill-pending {
    background: var(--warning-bg);
    color: var(--warning-text);
    border-color: transparent;
  }
  .pill-none {
    background: var(--bg-subtle);
    color: var(--text-sub);
  }
  .pill-rejected {
    background: var(--error-bg);
    color: var(--error);
    border-color: transparent;
  }
  .ticket-section {
    margin-bottom: var(--space-4);
    padding-bottom: var(--space-4);
    border-bottom: 1px solid var(--border);
  }
  .ticket-section:last-of-type { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
  .ticket-section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: var(--space-3);
    margin-bottom: var(--space-3);
  }
  .ticket-section-title {
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
  }
  .chevron {
    flex-shrink: 0;
    width: 20px;
    height: 20px;
    color: var(--text-sub);
    transition: transform 0.2s;
    margin-top: 2px;
  }
  .game-card.open .chevron { transform: rotate(180deg); }
  .loading-msg {
    text-align: center;
    padding: var(--space-7) var(--space-4);
    color: var(--text-sub);
    font-size: 14px;
    line-height: 1.7;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius-card);
    box-shadow: var(--shadow-card);
  }
  .loading-msg.is-error {
    color: var(--error);
  }
  .skeleton-card {
    background: var(--card);
    border-radius: var(--radius-card);
    border: 1px solid var(--border);
    box-shadow: var(--shadow-card);
    padding: var(--space-4);
    overflow: hidden;
  }
  .skeleton-line {
    height: 12px;
    border-radius: var(--radius-pill);
    background: var(--bg-subtle);
  }
  .skeleton-line.date { width: 34%; margin-bottom: var(--space-2); }
  .skeleton-line.title { width: 62%; height: 16px; margin-bottom: var(--space-2); }
  .skeleton-line.deadline { width: 48%; margin-bottom: var(--space-3); }
  .skeleton-pill-row { display: flex; gap: var(--space-2); flex-wrap: wrap; }
  .skeleton-pill {
    width: 72px;
    height: 32px;
    border-radius: var(--radius-pill);
    background: var(--bg-subtle);
  }
  .expired-toggle {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: var(--space-3);
    padding: var(--space-4);
    margin-top: var(--space-2);
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius-card);
    box-shadow: var(--shadow-card);
    font-size: 14px;
    font-weight: 700;
    color: var(--text-sub);
    cursor: pointer;
    min-height: 44px;
    user-select: none;
  }
  .expired-toggle svg { transition: transform 0.2s; flex-shrink: 0; }
  .expired-toggle.open svg { transform: rotate(180deg); }
  .expired-list {
    display: flex;
    flex-direction: column;
    gap: var(--space-3);
    margin-top: var(--space-3);
  }
  .expired-list .game-card { opacity: 0.72; }
  .expired-list .section-label { color: var(--text-muted); }
  .section-label {
    font-size: 12px;
    font-weight: 700;
    color: var(--text-sub);
    letter-spacing: 0.08em;
    margin: var(--space-2) 0 var(--space-1);
    text-transform: uppercase;
  }
  .ticket-type-label {
    font-size: 12px;
    font-weight: 600;
    padding: 4px 8px;
    border-radius: var(--radius-pill);
    background: var(--primary-weak);
    color: var(--accent-line);
    display: inline-block;
    margin-bottom: var(--space-2);
  }
  .fab {
    position: fixed;
    right: var(--space-4);
    bottom: calc(var(--space-4) + env(safe-area-inset-bottom));
    background: var(--primary);
    color: var(--bg);
    border: 1px solid var(--primary);
    border-radius: var(--radius-control);
    padding: 0 var(--space-5);
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    min-height: 48px;
    max-width: calc(100vw - 32px);
    box-shadow: var(--shadow-card);
    z-index: 100;
    font-family: inherit;
  }
  button:focus-visible,
  a:focus-visible,
  input:focus-visible,
  select:focus-visible,
  textarea:focus-visible {
    outline: 2px solid var(--primary);
    outline-offset: 2px;
  }
  @media (min-width: 768px) {
    .container { padding: var(--space-6) var(--space-4) var(--space-8); }
    .summary-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    .header-inner { justify-content: space-between; }
    .header-copy { text-align: left; }
  }
  @media (max-width: 767px) {
    .container { padding-bottom: calc(108px + env(safe-area-inset-bottom)); }
    header { padding: var(--space-4) var(--space-4) var(--space-3); }
    .header-inner {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: start;
    }
    .header-copy {
      grid-column: 1 / -1;
      order: 2;
      text-align: left;
    }
    .header-actions {
      grid-column: 1 / -1;
      justify-content: flex-end;
      order: 1;
    }
    .card,
    .summary-card,
    .game-card-detail,
    .expired-toggle,
    .skeleton-card {
      padding-left: var(--space-4);
      padding-right: var(--space-4);
    }
    .summary-grid { gap: var(--space-2); }
    .summary-card .num { font-size: 24px; }
    .filter-btn {
      min-width: max-content;
    }
    .game-card-header {
      padding: var(--space-4);
      gap: var(--space-2);
    }
    .game-title {
      font-size: 16px;
      white-space: normal;
    }
    .detail-row {
      flex-direction: column;
      gap: var(--space-1);
    }
    .detail-label { min-width: 0; }
    .detail-actions {
      flex-direction: column;
      gap: var(--space-2);
    }
    .btn-edit,
    .btn-cancel,
    .btn-apply {
      width: 100%;
      min-width: 0;
    }
    .ticket-status-row { gap: 6px; }
    .ticket-pill {
      white-space: normal;
      align-items: flex-start;
    }
    .fab {
      left: var(--space-4);
      right: var(--space-4);
      width: auto;
    }
  }
  @media (max-width: 420px) {
    body { padding-bottom: calc(92px + env(safe-area-inset-bottom)); }
    .container { padding: var(--space-4) var(--space-4) var(--space-8); }
    .summary-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<header>
  <div class="header-inner">
    <div class="header-copy">
      <h1 data-i18n="title">申込状況ダッシュボード</h1>
      <div class="header-sub" id="player-name-display"></div>
    </div>
    <div class="header-actions">
      <button id="lang-toggle" class="lang-btn" onclick="toggleLang()">JA / en</button>
      <button class="btn-logout" onclick="logout()" data-i18n="logout">ログアウト</button>
    </div>
  </div>
</header>

<div class="container">
  <div class="top-shell">
    <section class="card">
      <div class="section-eyebrow">Player Dashboard</div>
      <h2 class="section-title" data-i18n="heroTitle">申込状況をまとめて確認</h2>
      <p class="section-description" data-i18n="heroDescription">試合ごとの申込状況と受付締切を上から順に確認できます。必要な試合だけ開いて内容を見てください。</p>
    </section>

    <div class="summary-grid">
      <div class="summary-card">
        <div class="num num-total" id="cnt-total">—</div>
        <div class="lbl" data-i18n="cntTotal">申込済み</div>
      </div>
      <div class="summary-card">
        <div class="num num-pending" id="cnt-pending">—</div>
        <div class="lbl" data-i18n="cntPending">確認中</div>
      </div>
      <div class="summary-card">
        <div class="num num-confirmed" id="cnt-confirmed">—</div>
        <div class="lbl" data-i18n="cntConfirmed">確保済み</div>
      </div>
      <div class="summary-card">
        <div class="num num-rejected" id="cnt-rejected">—</div>
        <div class="lbl" data-i18n="cntRejected">対応不可</div>
      </div>
    </div>
  </div>

  <section class="card">
    <div class="section-eyebrow">Filters</div>
    <h2 class="section-title" data-i18n="listTitle">試合一覧</h2>
    <p class="section-description" data-i18n="listDescription">表示したい試合だけを切り替えられます。各行を開くと、申込内容と現在の状態を確認できます。</p>

    <div class="filter-bar">
      <button class="filter-btn active" onclick="setFilter('all', this)" data-i18n="filterAll">全試合</button>
      <button class="filter-btn" onclick="setFilter('applied', this)" data-i18n="filterApplied">申込あり</button>
      <button class="filter-btn" onclick="setFilter('none', this)" data-i18n="filterNone">未申込</button>
      <button class="filter-btn" onclick="setFilter('upcoming', this)" data-i18n="filterUpcoming">直近</button>
    </div>

    <div id="game-list" class="game-list" aria-live="polite">
      <div class="skeleton-card" aria-hidden="true">
        <div class="skeleton-line date"></div>
        <div class="skeleton-line title"></div>
        <div class="skeleton-line deadline"></div>
        <div class="skeleton-pill-row">
          <div class="skeleton-pill"></div>
          <div class="skeleton-pill"></div>
          <div class="skeleton-pill"></div>
        </div>
      </div>
      <div class="skeleton-card" aria-hidden="true">
        <div class="skeleton-line date"></div>
        <div class="skeleton-line title"></div>
        <div class="skeleton-line deadline"></div>
        <div class="skeleton-pill-row">
          <div class="skeleton-pill"></div>
          <div class="skeleton-pill"></div>
          <div class="skeleton-pill"></div>
        </div>
      </div>
      <div class="skeleton-card" aria-hidden="true">
        <div class="skeleton-line date"></div>
        <div class="skeleton-line title"></div>
        <div class="skeleton-line deadline"></div>
        <div class="skeleton-pill-row">
          <div class="skeleton-pill"></div>
          <div class="skeleton-pill"></div>
          <div class="skeleton-pill"></div>
        </div>
      </div>
    </div>
  </section>
</div>

<button class="fab" onclick="location.href='player-form.html'" data-i18n="newApp">＋ 新規申込</button>

<script src="./api-client.js"></script>
<script>
// ─── i18n ───────────────────────────────────────────
const STRINGS = { ja: {}, en: {} };
let lang = localStorage.getItem('ht_lang') || 'ja';
function t(key) { return (STRINGS[lang] && STRINGS[lang][key]) || (STRINGS.ja && STRINGS.ja[key]) || key; }
function applyI18n() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const k = el.getAttribute('data-i18n');
    if (el.tagName === 'INPUT' && el.hasAttribute('placeholder')) el.placeholder = t(k);
    else el.textContent = t(k);
  });
  const btn = document.getElementById('lang-toggle');
  if (btn) btn.textContent = lang === 'ja' ? 'JA / en' : 'ja / EN';
}
function toggleLang() {
  lang = lang === 'ja' ? 'en' : 'ja';
  localStorage.setItem('ht_lang', lang);
  applyI18n();
  location.reload();
}

STRINGS.ja = {

function formatDate(dateStr) {
  const d = new Date(dateStr);
  if (isNaN(d.getTime())) return dateStr;
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}/${m}/${day}`;
}
function esc(s) {
  const d = document.createElement('div');
  d.textContent = s ?? '';
  return d.innerHTML;
}

let auth = null;
let games = [];
let applications = [];
let currentFilter = 'all';
const GAMES_CACHE_KEY = 'games_cache';
const GAMES_CACHE_TS_KEY = 'games_cache_ts';
const GAMES_CACHE_TTL_MS = 5 * 60 * 1000;

const TICKET_LABELS = {
  invite: { ja: '招待', en: 'Invite' },
  family: { ja: '家族席', en: 'Family' },
  paid: { ja: '有料', en: 'Paid' },
};
const PICKUP_LABELS = { pre: '事前受取', day: '当日受取' };
const STATUS_CONFIG = {
  pending:   { label: '確認中', en: 'Pending', cls: 'badge-pending' },
  confirmed: { label: '確保済み', en: 'Confirmed', cls: 'badge-confirmed' },
  rejected:  { label: '対応不可', en: 'Unavailable', cls: 'badge-rejected' },
  cancelled: { label: 'キャンセル', en: 'Cancelled', cls: 'badge-none' },
};

window.addEventListener('DOMContentLoaded', async () => {
  applyI18n();
  auth = JSON.parse(sessionStorage.getItem('auth') || 'null');
  if (!auth || auth.role !== 'player') { window.location.href = 'index.html'; return; }
  document.getElementById('player-name-display').textContent = auth.name + '（' + auth.playerId + '）';
  await loadData();
});

async function loadData() {
  try {
    const [gamesRes, appsRes] = await Promise.all([
      getGames(),
      getApplications()
    ]);
    if (workerApiClient.isUnauthorizedResult(appsRes)) {
      sessionStorage.clear();
      window.location.href = 'index.html';
      return;
    }
    if (!gamesRes.ok) throw new Error(gamesRes.error?.message || gamesRes.error);
    if (!appsRes.ok) throw new Error(appsRes.error?.message || appsRes.error);
    games = gamesRes.data;
    applications = appsRes.data.filter(a => a.status !== 'cancelled');
    updateSummary();
    renderList();
  } catch (e) {
    document.getElementById('game-list').innerHTML = `<div class="loading-msg is-error">データ読み込み失敗: ${esc(e.message)}</div>`;
  }
}

async function getGames() {
  const ts = Number(sessionStorage.getItem(GAMES_CACHE_TS_KEY) || 0);
  const cached = sessionStorage.getItem(GAMES_CACHE_KEY);
  if (cached && Date.now() - ts < GAMES_CACHE_TTL_MS) {
    try {
      return JSON.parse(cached);
    } catch (e) {
      sessionStorage.removeItem(GAMES_CACHE_KEY);
      sessionStorage.removeItem(GAMES_CACHE_TS_KEY);
    }
  }

  const result = await workerApiClient.getGames();
  if (result.ok) {
    sessionStorage.setItem(GAMES_CACHE_KEY, JSON.stringify(result));
    sessionStorage.setItem(GAMES_CACHE_TS_KEY, String(Date.now()));
  }
  return result;
}

function getApplications() {
  return workerApiClient.getApplications();
}

function updateSummary() {
  const active = applications.filter(a => a.status !== 'cancelled');
  document.getElementById('cnt-total').textContent = active.length;
  document.getElementById('cnt-pending').textContent = active.filter(a => a.status === 'pending').length;
  document.getElementById('cnt-confirmed').textContent = active.filter(a => a.status === 'confirmed').length;
  document.getElementById('cnt-rejected').textContent = active.filter(a => a.status === 'rejected').length;
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}

function filterGames() {
  const today = new Date();
  const near = new Date(today.getTime() + 14 * 24 * 60 * 60 * 1000);
  return games.filter(g => {
    const app = getApp(g.gameId);
    const appList = getApps(g.gameId);
    if (currentFilter === 'applied') return appList.length > 0;
    if (currentFilter === 'none') return appList.length === 0;
    if (currentFilter === 'upcoming') return new Date(g.date) <= near && new Date(g.date) >= today;
    return true;
  });
}

function getApp(gameId) {
  return applications.find(a => String(a.gameId) === String(gameId));
}
function getApps(gameId) {
  return applications.filter(a => String(a.gameId) === String(gameId));
}

function ticketLabelHtml(type) {
  const label = TICKET_LABELS[type];
  if (!label) return esc(type);
  return `<span>${label.ja}<span class="en-sub">${label.en}</span></span>`;
}

function statusLabelHtml(status) {
  const cfg = STATUS_CONFIG[status];
  if (!cfg) return esc(status);
  return `<span>${cfg.label}<span class="en-sub">${cfg.en}</span></span>`;
}

function renderList() {
  const filtered = filterGames();
  const el = document.getElementById('game-list');
  if (filtered.length === 0) {
    el.innerHTML = `<div class="loading-msg">${t('noMatch')}</div>`;
    return;
  }

  // 受付中 / 終了済みに分離
  const active  = filtered.filter(g => !g.isDeadlinePassed);
  const expired = filtered.filter(g => g.isDeadlinePassed);

  // 月ごとにグループ化して html 生成
  function groupHtml(list) {
    const grouped = {};
    list.forEach(g => {
      const month = g.date.slice(0, 7);
      if (!grouped[month]) grouped[month] = [];
      grouped[month].push(g);
    });
    let h = '';
    Object.keys(grouped).sort().forEach(month => {
      const [, m] = month.split('-');
      h += `<div class="section-label">${parseInt(m)}月の試合</div>`;
      grouped[month].forEach(g => { h += buildGameCard(g); });
    });
    return h;
  }

  let html = '';

  if (active.length === 0 && expired.length === 0) {
    html = `<div class="loading-msg">${t('noMatch')}</div>`;
  } else {
    html += groupHtml(active);
    if (expired.length > 0) {
      html += `
        <div class="expired-toggle" onclick="toggleExpired(this)">
          <span>${t('expiredLabel')}（${expired.length}件）</span>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="16" height="16"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
        <div class="expired-list" hidden>
          ${groupHtml(expired)}
        </div>`;
    }
  }

  el.innerHTML = html;
}

function toggleExpired(btn) {
  const list = btn.nextElementSibling;
  const isHidden = list.hasAttribute('hidden');
  list.toggleAttribute('hidden', !isHidden);
  btn.classList.toggle('open', isHidden);
}

function buildTicketPill(app, type, isPassed) {
  const label = ticketLabelHtml(type);
  if (!app) {
    if (isPassed) return `<span class="ticket-pill pill-none">${label}<span>—</span></span>`;
    return `<span class="ticket-pill pill-none">${label}<span>未申込<span class="en-sub">Not Requested</span></span></span>`;
  }
  const pillCls = app.status === 'confirmed' ? 'pill-confirmed'
    : app.status === 'pending' ? 'pill-pending'
    : app.status === 'rejected' ? 'pill-rejected'
    : 'pill-done';
  return `<span class="ticket-pill ${pillCls}">${label} ${statusLabelHtml(app.status)}</span>`;
}

function buildTicketSection(app, type, gameId, isPassed) {
  const label = ticketLabelHtml(type);
  const pickupLabel = PICKUP_LABELS[app.pickupMethod] || app.pickupMethod;
  let qtyText = '';
  if (type === 'family') {
    const parts = [];
    if (app.quantityAdult > 0) parts.push(`大人${app.quantityAdult}枚`);
    if (app.quantityChild > 0) parts.push(`子供${app.quantityChild}枚`);
    if (app.quantityInfant > 0) parts.push(`未就学児${app.quantityInfant}枚`);
    qtyText = parts.join('・') || '0枚';
  } else {
    qtyText = `${app.quantityAdult || 0}枚`;
  }
  const seatText = app.seatType ? `（${app.seatType}席）` : '';
  const cfg = STATUS_CONFIG[app.status] || { label: app.status, cls: 'badge-none' };

  return `
    <div class="ticket-section">
      <div class="ticket-section-header">
        <span class="ticket-section-title">${label}</span>
        <span class="badge ${cfg.cls}">${statusLabelHtml(app.status)}</span>
      </div>
      <div class="detail-row"><span class="detail-label">枚数</span><span class="detail-value">${qtyText}${seatText}</span></div>
      <div class="detail-row"><span class="detail-label">受取者</span><span class="detail-value">${esc(app.receiverName) || '—'}</span></div>
      <div class="detail-row"><span class="detail-label">受取方法</span><span class="detail-value">${pickupLabel}</span></div>
      ${app.note ? `<div class="detail-row"><span class="detail-label">備考</span><span class="detail-value">${esc(app.note)}</span></div>` : ''}
      <div class="detail-row"><span class="detail-label">申込日時</span><span class="detail-value detail-value-muted">${app.createdAt}</span></div>
    </div>`;
}

function buildGameCard(g) {
  const appList = getApps(g.gameId);
  const appByType = {};
  appList.forEach(a => { appByType[a.ticketType] = a; });
  const types = ['invite', 'family', 'paid'];
  const hasAny = appList.length > 0;

  const deadlineText = g.deadline
    ? `申込期限: ${g.deadline}${g.isDeadlinePassed ? '（終了）' : ''}`
    : '期限未設定';

  // ヘッダーの3種別ピル
  const pillsHtml = `
    <div class="ticket-status-row">
      ${types.map(t => buildTicketPill(appByType[t], t, g.isDeadlinePassed)).join('')}
    </div>`;

  // 詳細エリア: 申込済みの種別 + 未申込なら申込ボタン
  let detailHtml = '';
  types.forEach(t => {
    if (appByType[t]) {
      detailHtml += buildTicketSection(appByType[t], t, g.gameId, g.isDeadlinePassed);
    }
  });
  if (!g.isDeadlinePassed) {
    detailHtml += `
      <div class="detail-actions${hasAny ? '' : ' is-standalone'}">
        <button class="btn-apply" onclick="location.href='player-form.html?gameId=${g.gameId}'">
          ${hasAny ? '追加で申込む' : 'この試合に申込む'}
        </button>
      </div>`;
  } else if (!hasAny) {
    detailHtml = `<div class="detail-value detail-value-muted">申込期限が終了しています</div>`;
  }

  return `
    <div class="game-card" id="card-${esc(g.gameId)}">
      <div class="game-card-header" onclick="toggleCard('${esc(g.gameId)}')">
        <div class="game-info">
          <div class="game-date">${esc(formatDate(g.date))}（${esc(g.dayOfWeek)}）</div>
          <div class="game-title">vs ${esc(g.opponent)}</div>
          <div class="game-deadline">${esc(deadlineText)}</div>
          ${pillsHtml}
        </div>
        <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </div>
      <div class="game-card-detail">${detailHtml}</div>
    </div>
  `;
}

function toggleCard(gameId) {
  const card = document.getElementById('card-' + gameId);
  card.classList.toggle('open');
}

function editApp(gameId, type) {
  location.href = `player-form.html?gameId=${gameId}&type=${type}&edit=1`;
}

async function cancelApp(applicationId, gameId) {
  if (!confirm('この申込をキャンセルしますか？')) return;
  try {
    const result = await workerApiClient.cancelApplication(applicationId);
    if (workerApiClient.isUnauthorizedResult(result)) {
      sessionStorage.clear();
      location.href = 'index.html';
      return;
    }
    if (!result.ok) throw new Error(result.error?.message || result.error);
    await loadData();
  } catch (e) {
    alert('キャンセル失敗: ' + e.message);
  }
}

async function logout() {
  try {
    await workerApiClient.logout();
  } finally {
    sessionStorage.clear();
    location.href = 'index.html';
  }
}
