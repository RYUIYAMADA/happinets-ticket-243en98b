<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 2500px;
    height: 1686px;
    background: #ffffff;
    font-family: 'Noto Sans JP', 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
    overflow: hidden;
  }
  .container {
    display: flex;
    width: 2500px;
    height: 1686px;
  }
  .btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    position: relative;
    gap: 0;
  }
  .btn + .btn {
    border-left: 3px solid #e2e8f0;
  }
  /* ボタン1: 予約する — プライマリブルー */
  .btn-reserve {
    background: #2456e6;
  }
  /* ボタン2: マイ申込状況 — 白 */
  .btn-status {
    background: #ffffff;
  }
  /* ボタン3: トップ — 薄グレー */
  .btn-home {
    background: #f5f6f8;
  }

  /* ── アイコンエリア ── */
  .icon-wrap {
    width: 220px;
    height: 220px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 60px;
  }
  .icon-wrap-reserve { background: rgba(255,255,255,0.15); }
  .icon-wrap-status  { background: #eaf0ff; }
  .icon-wrap-home    { background: #e2e8f0; }

  /* ── SVG アイコン ── */
  .icon-svg {
    width: 110px;
    height: 110px;
  }
  .icon-svg-reserve { stroke: #ffffff; }
  .icon-svg-status  { stroke: #2456e6; }
  .icon-svg-home    { stroke: #1a3fa0; }

  /* ── メインラベル ── */
  .label {
    font-size: 100px;
    font-weight: 700;
    letter-spacing: 0.04em;
    line-height: 1.1;
    text-align: center;
  }
  .label-reserve { color: #ffffff; }
  .label-status  { color: #2456e6; }
  .label-home    { color: #1a3fa0; }

  /* ── サブラベル（英語） ── */
  .sublabel {
    font-size: 52px;
    font-weight: 500;
    margin-top: 20px;
    text-align: center;
    letter-spacing: 0.06em;
  }
  .sublabel-reserve { color: rgba(255,255,255,0.80); }
  .sublabel-status  { color: #5a78bf; }
  .sublabel-home    { color: #5a78bf; }

  /* ── タップヒント（底部） ── */
  .tap-hint {
    position: absolute;
    bottom: 80px;
    font-size: 38px;
    font-weight: 500;
    padding: 16px 48px;
    border-radius: 999px;
    letter-spacing: 0.08em;
  }
  .tap-hint-reserve {
    background: rgba(255,255,255,0.18);
    color: rgba(255,255,255,0.90);
  }
  .tap-hint-status {
    background: #eaf0ff;
    color: #2456e6;
  }
  .tap-hint-home {
    background: #e2e8f0;
    color: #1a3fa0;
  }

  /* ── 区切り線（上部カラーバー） ── */
  .top-bar {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 16px;
  }
  .top-bar-reserve { background: rgba(255,255,255,0.35); }
  .top-bar-status  { background: #2456e6; }
  .top-bar-home    { background: #1a3fa0; }
</style>
</head>
<body>
<div class="container">

  <!-- ボタン1: 予約する / Reserve -->
  <div class="btn btn-reserve">
    <div class="top-bar top-bar-reserve"></div>
    <div class="icon-wrap icon-wrap-reserve">
      <!-- チケット(outline)アイコン -->
      <svg class="icon-svg icon-svg-reserve" viewBox="0 0 64 64" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <!-- チケット本体 -->
        <rect x="6" y="18" width="52" height="28" rx="3"/>
        <!-- ミシン目（左ノッチ） -->
        <path d="M6 28 Q12 28 12 32 Q12 36 6 36"/>
        <!-- ミシン目（右ノッチ） -->
        <path d="M58 28 Q52 28 52 32 Q52 36 58 36"/>
        <!-- 縦点線 -->
        <line x1="20" y1="20" x2="20" y2="44" stroke-dasharray="4 4"/>
        <!-- ★マーク -->
        <polygon points="36,24 38,30 44,30 39,34 41,40 36,36 31,40 33,34 28,30 34,30" stroke-width="2"/>
      </svg>
    </div>
    <div class="label label-reserve">予約する</div>
    <div class="sublabel sublabel-reserve">Reserve</div>
    <div class="tap-hint tap-hint-reserve">タップして申込 →</div>
  </div>

  <!-- ボタン2: マイ申込状況 / My Requests -->
  <div class="btn btn-status">
    <div class="top-bar top-bar-status"></div>
    <div class="icon-wrap icon-wrap-status">
      <!-- クリップボード+チェック(outline)アイコン -->
      <svg class="icon-svg icon-svg-status" viewBox="0 0 64 64" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <!-- クリップボード本体 -->
        <rect x="12" y="12" width="40" height="48" rx="3"/>
        <!-- 上部クリップ -->
        <path d="M24 12 Q24 6 32 6 Q40 6 40 12"/>
        <!-- 横線 1 -->
        <line x1="20" y1="28" x2="44" y2="28"/>
        <!-- 横線 2 -->
        <line x1="20" y1="38" x2="36" y2="38"/>
        <!-- チェックマーク -->
        <polyline points="20,50 26,56 40,42"/>
      </svg>
    </div>
    <div class="label label-status">マイ申込状況</div>
    <div class="sublabel sublabel-status">My Requests</div>
    <div class="tap-hint tap-hint-status">タップして確認 →</div>
  </div>

  <!-- ボタン3: トップ / Home -->
  <div class="btn btn-home">
    <div class="top-bar top-bar-home"></div>
    <div class="icon-wrap icon-wrap-home">
      <!-- ホーム(outline)アイコン -->
      <svg class="icon-svg icon-svg-home" viewBox="0 0 64 64" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <!-- 屋根 -->
        <polyline points="8,30 32,8 56,30"/>
        <!-- 外壁 -->
        <path d="M14 28 L14 56 L50 56 L50 28"/>
        <!-- ドア -->
        <rect x="24" y="40" width="16" height="16" rx="2"/>
        <!-- 窓（左） -->
        <rect x="16" y="32" width="10" height="8" rx="1"/>
        <!-- 窓（右） -->
        <rect x="38" y="32" width="10" height="8" rx="1"/>
      </svg>
    </div>
    <div class="label label-home">トップ</div>
    <div class="sublabel sublabel-home">Home</div>
    <div class="tap-hint tap-hint-home">タップしてホームへ →</div>
  </div>

</div>
</body>
</html>
