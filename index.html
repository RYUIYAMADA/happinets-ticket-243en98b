<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>選手家族チケット申込 — ログイン</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --primary: #000000;
    --primary-hover: #1a1a1a;
    --accent: #EC008C;
    --accent-hover: #c4006e;
    --gold: #E6B422;
    --gold-hover: #c9971b;
    --bg: #f5f7fa;
    --card: #ffffff;
    --border: #e2e8f0;
    --text: #1a202c;
    --text-sub: #4a5568;
    --error: #dc2626;
    --radius: 12px;
    --shadow: 0 4px 24px rgba(0,0,0,0.08);
  }
  .en-sub { font-size: 11px; color: var(--text-sub); display: block; font-weight: 400; margin-top: 1px; }
  body {
    font-family: 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
    background: var(--bg);
    font-size: 14px;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px 16px;
    overflow-x: hidden;
    -webkit-tap-highlight-color: transparent;
    line-break: strict;
  }
  button, label, input { touch-action: manipulation; }
  .card {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    width: 100%;
    max-width: 420px;
    padding: 32px 20px;
  }
  .logo {
    text-align: center;
    margin-bottom: 32px;
  }
  .logo-badge {
    display: inline-block;
    background: var(--gold);
    color: #fff;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.08em;
    padding: 4px 10px;
    border-radius: 4px;
    margin-bottom: 8px;
  }
  .logo h1 {
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.4;
  }
  .tabs {
    display: flex;
    background: var(--bg);
    border-radius: 8px;
    padding: 4px;
    margin-bottom: 28px;
  }
  .tab {
    flex: 1;
    padding: 10px;
    font-size: 14px;
    font-weight: 600;
    text-align: center;
    cursor: pointer;
    border-radius: 6px;
    color: var(--text-sub);
    transition: all 0.15s;
    border: none;
    background: transparent;
    min-height: 44px;
    min-width: 44px;
  }
  .tab.active {
    background: var(--card);
    color: var(--accent);
    box-shadow: 0 0 0 1px var(--border);
  }
  .form-group { margin-bottom: 20px; }
  label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 6px;
  }
  input {
    width: 100%;
    padding: 12px 14px;
    font-size: 16px;
    min-height: 44px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    background: #fff;
    transition: border-color 0.15s;
    -webkit-appearance: none;
  }
  input:focus { outline: none; border-color: var(--accent); }
  .btn {
    width: 100%;
    padding: 14px;
    font-size: 16px;
    font-weight: 700;
    color: #fff;
    background: var(--accent);
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.15s;
    min-height: 44px;
    min-width: 44px;
  }
  .btn:hover { background: var(--accent-hover); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .error-msg {
    color: var(--error);
    font-size: 14px;
    margin-top: 12px;
    text-align: center;
    min-height: 20px;
  }
  .panel { display: none; }
  .panel.active { display: block; }
  .loading { opacity: 0.6; pointer-events: none; }
  .id-hint {
    font-size: 12px;
    color: var(--text-sub);
    margin: -12px 0 16px;
    padding: 8px 10px;
    background: var(--bg);
    border-radius: 6px;
  }
  .role-options {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 4px;
  }
  .role-option {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 10px 8px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    min-height: 44px;
    min-width: 44px;
  }
  .role-option input[type="radio"] {
    accent-color: var(--accent);
    flex-shrink: 0;
    width: 18px;
    height: 18px;
  }
  @media (min-width: 481px) {
    .role-options { flex-direction: row; }
    .role-option { flex: 1; white-space: nowrap; }
  }
  @media (max-width: 480px) {
    body {
      align-items: flex-start;
      padding: 16px;
    }
    .card {
      padding: 24px 16px;
      border-radius: 10px;
    }
    .logo { margin-bottom: 24px; }
    .logo h1 { font-size: 18px; }
    .tabs { margin-bottom: 22px; }
    .tab { padding: 8px 6px; }
    .form-group { margin-bottom: 16px; }
    .role-option {
      padding: 10px;
      gap: 8px;
    }
  }
  @media (min-width: 769px) {
    .card { padding: 40px 32px; }
  }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-badge">秋田ノーザンハピネッツ</div>
    <h1>選手家族<br>チケット申込システム<span class="en-sub">Player Family Ticket Request System</span></h1>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('player')">選手ログイン<span class="en-sub">Player Login</span></button>
    <button class="tab" onclick="switchTab('admin')">管理者<span class="en-sub">Admin</span></button>
  </div>

  <div id="panel-player" class="panel active">
    <div class="form-group">
      <label for="playerId">番号（3桁）<span class="en-sub">ID Number (3 digits)</span></label>
      <input type="text" id="playerId" placeholder="例: 006（選手）　101（スタッフ）" maxlength="3" inputmode="numeric" pattern="[0-9]{3}">
    </div>
    <div class="id-hint">
      選手: 背番号3桁　／　スタッフ: 101〜<span class="en-sub">Players: 3-digit jersey number / Staff: 101 and up</span>
    </div>
    <button class="btn" onclick="loginPlayer()">ログイン<span class="en-sub">Login</span></button>
    <div class="error-msg" id="player-error"></div>
  </div>

  <div id="panel-admin" class="panel">
    <div class="form-group">
      <label>アカウント種別</label>
      <div class="role-options">
        <label class="role-option" id="role-ticket-label">
          <input type="radio" name="adminRole" value="ticket" checked onchange="updateRoleUI()">
          チケット担当
        </label>
        <label class="role-option" id="role-manager-label">
          <input type="radio" name="adminRole" value="manager" onchange="updateRoleUI()">
          チームマネージャー
        </label>
      </div>
    </div>
    <div class="form-group">
      <label for="adminPw">パスワード</label>
      <input type="password" id="adminPw" placeholder="パスワードを入力">
    </div>
    <button class="btn" onclick="loginAdmin()">管理者ログイン<span class="en-sub">Admin Login</span></button>
    <div class="error-msg" id="admin-error"></div>
  </div>
</div>

<script>
// ★ デプロイ後にGAS Web AppのURLを設定 ★
const GAS_URL = 'https://script.google.com/macros/s/AKfycbzx2dSpTkrIcWT9a2qzaM2pQIsRAQt3P0p6Y2q9gfr9mmU3oPgE3qeCNLRCQNJusFYo/exec';

function switchTab(type) {
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', (i === 0 && type === 'player') || (i === 1 && type === 'admin'));
  });
  document.getElementById('panel-player').classList.toggle('active', type === 'player');
  document.getElementById('panel-admin').classList.toggle('active', type === 'admin');
}

async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

function getLoginErrorMessage(e) {
  if (e.name === 'AbortError') return '通信がタイムアウトしました。再度お試しください';
  if (e.name === 'TypeError') return 'ネットワークエラーが発生しました。再度お試しください';
  return e.message;
}

async function fetchWithTimeout(url, options = {}, timeout = 10000) {
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), timeout);
  try {
    return await fetch(url, { ...options, signal: controller.signal });
  } finally {
    clearTimeout(timer);
  }
}

async function callGAS(method, params, retries = 2) {
  if (!GAS_URL) {
    // デモモード: LocalStorageでオフライン動作
    return demoMode(method, params);
  }
  for (let i = 0; i <= retries; i++) {
    try {
      if (method === 'GET') {
        const qs = new URLSearchParams(params).toString();
        const res = await fetchWithTimeout(`${GAS_URL}?${qs}`, { redirect: 'follow' });
        const json = await res.json();
        return json;
      } else {
        const res = await fetchWithTimeout(GAS_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify(params),
          redirect: 'follow'
        });
        const json = await res.json();
        return json;
      }
    } catch(e) {
      if (i === retries) throw e;
      await new Promise(r => setTimeout(r, 800));
    }
  }
}

async function loginPlayer() {
  const playerId = document.getElementById('playerId').value.trim();
  const errEl = document.getElementById('player-error');
  errEl.textContent = '';

  if (!playerId || playerId.length !== 3) { errEl.textContent = '3桁の番号を入力してください'; return; }

  const btn = document.querySelector('#panel-player .btn');
  const originalBtnHtml = btn.innerHTML;
  btn.disabled = true;
  btn.textContent = 'ログイン中...';
  try {
    const result = await callGAS('POST', { action: 'login', playerId });
    if (!result.ok) throw new Error(result.error);
    sessionStorage.setItem('auth', JSON.stringify(result.data));
    window.location.href = 'player-dashboard.html';
  } catch (e) {
    errEl.textContent = getLoginErrorMessage(e) || '番号が見つかりません';
  } finally {
    btn.disabled = false;
    btn.innerHTML = originalBtnHtml;
  }
}

function updateRoleUI() {
  const val = document.querySelector('input[name="adminRole"]:checked').value;
  document.getElementById('role-ticket-label').style.borderColor = val === 'ticket' ? 'var(--accent)' : 'var(--border)';
  document.getElementById('role-manager-label').style.borderColor = val === 'manager' ? 'var(--accent)' : 'var(--border)';
}
updateRoleUI();

async function loginAdmin() {
  const pw = document.getElementById('adminPw').value;
  const errEl = document.getElementById('admin-error');
  errEl.textContent = '';
  if (!pw) { errEl.textContent = 'パスワードを入力してください'; return; }

  const btn = document.querySelector('#panel-admin .btn');
  const originalBtnHtml = btn.innerHTML;
  btn.disabled = true;
  btn.textContent = 'ログイン中...';
  try {
    const SALT = 'hnts2026_';
    const hash = await sha256(SALT + pw);
    const result = await callGAS('POST', { action: 'adminLogin', passwordHash: hash });
    if (!result.ok) throw new Error(result.error);
    sessionStorage.setItem('auth', JSON.stringify(result.data));
    sessionStorage.setItem('adminPasswordHash', hash);
    window.location.href = 'admin.html';
  } catch (e) {
    errEl.textContent = getLoginErrorMessage(e) || 'ログインに失敗しました';
  } finally {
    btn.disabled = false;
    btn.innerHTML = originalBtnHtml;
  }
}

// =====================================================
// デモモード（GAS_URL未設定時のオフライン動作）
// =====================================================
function demoMode(method, params) {
  if (params.action === 'login') {
    const p = DEMO_MEMBERS.find(p => String(p.playerId) === String(params.playerId));
    if (p) return { ok: true, data: { playerId: p.playerId, name: p.name, role: 'player' } };
    return { ok: false, error: '番号が見つかりません（例: 006, 101）' };
  }
  if (params.action === 'adminLogin') {
    const adminRole = document.querySelector('input[name="adminRole"]:checked').value;
    return { ok: true, data: { role: 'admin', adminRole } };
  }
  return { ok: false, error: 'デモモード: この操作はGAS接続後に利用可能' };
}

const DEMO_MEMBERS = [
  // 選手

  { playerId: '012', name: '#12 元田 大陽' },
  { playerId: '013', name: '#13 小川 瑛次郎' },
  { playerId: '014', name: '#14 菅原 暉' },
  { playerId: '015', name: '#15 Tanner Leissner' },
  { playerId: '017', name: '#17 中山 拓哉' },
  { playerId: '018', name: '#18 岩屋 頼' },
  { playerId: '022', name: '#22 Ali Mezher' },
  { playerId: '024', name: '#24 髙比良 寛治' },
  { playerId: '025', name: '#25 Keanu Pinder' },
  { playerId: '027', name: '#27 Angelo Chol' },
  { playerId: '077', name: '#77 土屋 アリスター時生' },
  { playerId: '091', name: '野口 侑真' },
  { playerId: '092', name: 'イゴール・スヴェトリシック' },
  { playerId: '093', name: 'アブドゥレイ・トラオレ' },
  { playerId: '094', name: '前田 顕蔵' },
  // スタッフ
  { playerId: '101', name: 'HC Mick Downer' },
  { playerId: '102', name: 'AC 庄司 和広' },
  { playerId: '103', name: 'AC 奈良 篤人' },
  { playerId: '104', name: 'VC 守屋 健次郎' },
  { playerId: '105', name: 'VC 竹田 暁' },
  { playerId: '106', name: 'SC 大塚 健吾' },
  { playerId: '107', name: 'AT 飯田 瑶美' },
  { playerId: '108', name: 'AT 岡本 育' },
  { playerId: '109', name: 'CM 小高 行雄' },
  { playerId: '110', name: 'Mg 緑川 樹' },
  { playerId: '111', name: 'Mg 北野 陽菜' },
];

// Enter キー対応
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const activePanel = document.querySelector('.panel.active');
    if (activePanel.id === 'panel-player') loginPlayer();
    else loginAdmin();
  }
});

// GAS URL設定チェック
if (!GAS_URL) {
  console.info('デモモード: GAS_URLが未設定です。LocalStorage に GAS_URL を設定するか、index.html の GAS_URL 定数を更新してください。');
}
</script>
</body>
</html>
