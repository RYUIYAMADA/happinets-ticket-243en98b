<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel='preconnect' href='https://script.google.com'>
<link rel='preconnect' href='https://script.googleusercontent.com'>
<title>選手家族チケット申込 — ログイン</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff;
    --bg-subtle: #f5f6f8;
    --card: var(--bg);
    --primary: #2456e6;
    --primary-strong: #1d4fd7;
    --primary-weak: #eaf0ff;
    --accent-line: #2563eb;
    --accent-cta: #EA580C;
    --accent-cta-dark: #D64B00;
    --text: #0f172a;
    --text-sub: #64748b;
    --text-faint: #94a3b8;
    --text-muted: #667085;
    --border: #e2e8f0;
    --disabled: #cbd5e1;
    --required: #d11f3a;
    --success: #166534;
    --success-bg: #dcfce7;
    --success-border: #86efac;
    --warning-bg: #fef3c7;
    --warning-text: var(--text);
    --error: #dc2626;
    --error-bg: #fee2e2;
    --radius-card: 14px;
    --radius-control: 10px;
    --radius-pill: 999px;
    --space-1: 4px;
    --space-2: 8px;
    --space-3: 12px;
    --space-4: 16px;
    --space-5: 20px;
    --space-6: 24px;
    --space-7: 28px;
    --space-8: 32px;
    --shadow-card: 0 1px 2px rgba(15, 23, 42, 0.06);
    --shadow-focus: 0 0 0 3px rgba(37, 99, 235, 0.16);
    accent-color: var(--primary);
  }
  body {
    font-family: 'Noto Sans JP', 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', sans-serif;
    background: var(--bg-subtle);
    color: var(--text);
    font-size: 16px;
    min-height: 100vh;
    padding: var(--space-5) var(--space-4) calc(var(--space-8) + env(safe-area-inset-bottom));
    overflow-x: hidden;
    -webkit-tap-highlight-color: transparent;
    line-break: strict;
    overflow-wrap: anywhere;
    word-break: keep-all;
  }
  button, label, input { touch-action: manipulation; }
  button:focus-visible, input:focus-visible, label:focus-visible {
    outline: 2px solid var(--primary);
    outline-offset: 2px;
  }
  .page {
    width: 100%;
    max-width: 720px;
    margin: 0 auto;
  }
  .top-shell {
    display: flex;
    flex-direction: column;
    gap: var(--space-4);
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius-card);
    box-shadow: var(--shadow-card);
  }
  .hero-card {
    padding: var(--space-5);
    display: flex;
    flex-direction: column;
    gap: var(--space-4);
  }
  .hero-head {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: var(--space-4);
  }
  .hero-copy {
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: var(--space-3);
  }
  .hero-badge {
    align-self: flex-start;
    display: inline-flex;
    align-items: center;
    min-height: 32px;
    padding: 0 var(--space-3);
    border-radius: var(--radius-pill);
    border: 1px solid var(--border);
    background: var(--primary-weak);
    color: var(--primary);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .section-eyebrow {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-sub);
  }
  .hero-title {
    font-size: 26px;
    font-weight: 700;
    line-height: 1.3;
    color: var(--text);
    overflow-wrap: anywhere;
  }
  .panel-title {
    font-size: 24px;
  }
  .lang-btn {
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--accent-line);
    padding: 0 var(--space-3);
    border-radius: var(--radius-pill);
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    min-height: 44px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .step-tabs {
    display: flex;
    gap: var(--space-2);
    overflow-x: auto;
    padding-bottom: var(--space-1);
    scrollbar-width: none;
  }
  .step-tabs::-webkit-scrollbar { display: none; }
  .tab {
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text-sub);
    padding: 0 var(--space-4);
    font-size: 14px;
    font-weight: 600;
    text-align: center;
    cursor: pointer;
    border-radius: var(--radius-pill);
    transition: background 0.15s, border-color 0.15s, color 0.15s;
    min-height: 44px;
    min-width: 44px;
    white-space: nowrap;
    flex: 1 0 auto;
  }
  .tab.active {
    background: var(--primary);
    color: var(--bg);
    border-color: var(--primary);
  }
  .panel {
    display: none;
    padding: var(--space-5);
  }
  .panel.active { display: block; }
  .section-stack {
    display: flex;
    flex-direction: column;
    gap: var(--space-4);
  }
  .form-group { margin-bottom: 20px; }
  .form-group:last-child { margin-bottom: 0; }
  label {
    display: block;
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: var(--space-2);
    line-height: 1.6;
    overflow-wrap: anywhere;
  }
  input {
    width: 100%;
    padding: var(--space-3) var(--space-4);
    font-size: 16px;
    min-height: 48px;
    border: 1px solid var(--border);
    border-radius: var(--radius-control);
    color: var(--text);
    background: var(--bg);
    transition: border-color 0.15s, box-shadow 0.15s;
    -webkit-appearance: none;
    font-family: inherit;
    font-weight: 500;
  }
  input::placeholder {
    color: var(--text-muted);
    opacity: 1;
  }
  input:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: var(--shadow-focus);
  }
  .btn {
    width: 100%;
    padding: var(--space-3) var(--space-4);
    font-size: 16px;
    font-weight: 700;
    color: #ffffff;
    background: var(--primary);
    background-color: var(--primary);
    border: none;
    border-radius: var(--radius-control);
    cursor: pointer;
    transition: background 0.15s;
    min-height: 48px;
    min-width: 44px;
    font-family: inherit;
    -webkit-appearance: none;
    appearance: none;
  }
  .btn:hover { background: var(--primary-strong); }
  .btn:disabled {
    background: var(--disabled);
    cursor: not-allowed;
  }
  .error-msg {
    color: var(--error);
    font-size: 14px;
    margin-top: var(--space-3);
    line-height: 1.6;
    min-height: 20px;
    overflow-wrap: anywhere;
  }
  .loading { opacity: 0.6; pointer-events: none; }
  .id-hint {
    font-size: 12px;
    color: var(--text-sub);
    line-height: 1.6;
    margin-top: calc(var(--space-3) * -1);
    padding: var(--space-3) var(--space-4);
    background: var(--bg-subtle);
    border: 1px solid var(--border);
    border-radius: var(--radius-control);
    overflow-wrap: anywhere;
  }
  .role-options {
    display: flex;
    flex-direction: column;
    gap: var(--space-3);
  }
  .role-option {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: var(--space-4);
    border-radius: var(--radius-card);
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    color: var(--text-sub);
    background: var(--bg);
    border: 1px solid var(--border);
    transition: border-color 0.15s, background 0.15s, color 0.15s;
    user-select: none;
    min-height: 44px;
    text-align: center;
    overflow-wrap: anywhere;
  }
  .role-option input[type="radio"] {
    position: absolute;
    opacity: 0;
    width: 0;
    height: 0;
    pointer-events: none;
  }
  .role-option.selected {
    background: var(--primary-weak);
    color: var(--primary);
    border: 2px solid var(--primary);
  }
  @media (min-width: 481px) {
    .role-options {
      flex-direction: row;
    }
  }
  @media (max-width: 480px) {
    body { padding: var(--space-4); }
    .hero-card,
    .panel {
      padding: var(--space-4);
    }
    .hero-head {
      flex-direction: column;
      align-items: stretch;
    }
    .hero-title { font-size: 22px; }
    .form-group { margin-bottom: var(--space-4); }
  }
  @media (min-width: 769px) {
    body { padding: var(--space-8) var(--space-5); }
    .hero-card,
    .panel {
      padding: var(--space-6);
    }
  }
</style>
</head>
<body>
<main class="page">
  <div class="top-shell">
    <section class="card hero-card">
      <div class="hero-head">
        <div class="hero-copy">
          <div class="hero-badge">秋田ノーザンハピネッツ</div>
          <h1 class="hero-title" data-i18n="pageTitle">選手家族<br>チケット申込システム</h1>
        </div>
        <button id="lang-toggle" class="lang-btn" onclick="toggleLang()">JA / en</button>
      </div>
      <div class="step-tabs">
        <button class="tab active" onclick="switchTab('player')" data-i18n="playerTab">選手ログイン</button>
        <button class="tab" onclick="switchTab('admin')" data-i18n="adminTab">管理者</button>
      </div>
    </section>

    <section class="card">
      <div id="panel-player" class="panel active">
        <div class="section-stack">
          <div>
            <h2 class="hero-title panel-title" data-i18n="playerTab">選手ログイン</h2>
          </div>
          <div class="form-group">
            <label for="playerId" data-i18n="numberLabel">番号（3桁）</label>
            <input type="text" id="playerId" data-i18n="numberPlaceholder" placeholder="" maxlength="3" inputmode="numeric" pattern="[0-9]{3}">
          </div>
          <div class="id-hint" data-i18n="loginHint">
            選手: 背番号3桁　／　スタッフ: 101〜
          </div>
          <button class="btn" onclick="loginPlayer()" data-i18n="loginBtn">ログイン</button>
          <div class="error-msg" id="player-error"></div>
        </div>
      </div>

      <div id="panel-admin" class="panel">
        <div class="section-stack">
          <div>
            <h2 class="hero-title panel-title" data-i18n="adminTab">管理者</h2>
          </div>
          <div class="form-group">
            <label data-i18n="roleLabel">アカウント種別</label>
            <div class="role-options" role="radiogroup" aria-label="アカウント種別">
              <label class="role-option selected" id="role-ticket-label">
                <input type="radio" name="adminRole" value="ticket" checked onchange="updateRoleUI()">
                <span data-i18n="ticketRole">チケット担当</span>
              </label>
              <label class="role-option" id="role-manager-label">
                <input type="radio" name="adminRole" value="manager" onchange="updateRoleUI()">
                <span data-i18n="managerRole">チームマネージャー</span>
              </label>
            </div>
          </div>
          <div class="form-group">
            <label for="adminPw" data-i18n="pwLabel">パスワード</label>
            <input type="password" id="adminPw" data-i18n="pwPlaceholder">
          </div>
          <button class="btn" onclick="loginAdmin()" data-i18n="adminLoginBtn">管理者ログイン</button>
          <div class="error-msg" id="admin-error"></div>
        </div>
      </div>
    </section>
  </div>
</main>

<script src="./api-config.js"></script>
<script>
(function () {
  const DEFAULT_LOCAL_BASE_URL = "http://127.0.0.1:8787";
  const BASE_URL_STORAGE_KEY = "workerApiBaseUrl";

  function normalizeBaseUrl(url) {
    return String(url || "").trim().replace(/\/+$/, "");
  }

  function resolveBaseUrl() {
    const stored = normalizeBaseUrl(localStorage.getItem(BASE_URL_STORAGE_KEY));
    if (stored) return stored;
    const globalBaseUrl = normalizeBaseUrl(window.WORKER_API_BASE_URL);
    if (globalBaseUrl) return globalBaseUrl;
    if (window.location.protocol === "http:" || window.location.protocol === "https:") {
      return normalizeBaseUrl(window.location.origin);
    }
    return DEFAULT_LOCAL_BASE_URL;
  }

  function getStoredAuth() {
    return JSON.parse(sessionStorage.getItem("auth") || "null");
  }

  function getStoredToken() {
    const auth = getStoredAuth();
    return auth?.token || sessionStorage.getItem("adminToken") || sessionStorage.getItem("sessionToken") || "";
  }

  function setStoredToken(role, token) {
    if (!token) return;
    if (role === "admin") {
      sessionStorage.setItem("adminToken", token);
      sessionStorage.removeItem("sessionToken");
      return;
    }
    sessionStorage.setItem("sessionToken", token);
    sessionStorage.removeItem("adminToken");
  }

  function clearStoredTokens() {
    sessionStorage.removeItem("sessionToken");
    sessionStorage.removeItem("adminToken");
  }

  function buildHeaders(options, includeAuth) {
    const headers = new Headers(options?.headers || {});
    if (!headers.has("Content-Type") && options?.body !== undefined) {
      headers.set("Content-Type", "application/json");
    }
    if (includeAuth) {
      const token = getStoredToken();
      if (token) headers.set("Authorization", `Bearer ${token}`);
    }
    return headers;
  }

  async function parseResponse(response) {
    const text = await response.text();
    let json = null;

    if (text) {
      try {
        json = JSON.parse(text);
      } catch (error) {
        json = null;
      }
    }

    if (json && typeof json === "object") {
      if (!response.ok) {
        const errorObj = typeof json.error === "object" && json.error
          ? { ...json.error, status: response.status }
          : { message: json.error || response.statusText || "Request failed", status: response.status };
        return { ok: false, error: errorObj };
      }
      return json;
    }

    if (!response.ok) {
      return {
        ok: false,
        error: { message: response.statusText || "Request failed", status: response.status },
      };
    }

    return { ok: true, data: null };
  }

  async function request(path, options = {}, includeAuth = false) {
    const response = await fetch(`${resolveBaseUrl()}${path}`, {
      ...options,
      headers: buildHeaders(options, includeAuth),
    });
    const result = await parseResponse(response);

    if (result.ok && result.data?.token && result.data?.role) {
      setStoredToken(result.data.role, result.data.token);
    }

    return result;
  }

  function withQuery(path, params) {
    const search = new URLSearchParams();
    Object.entries(params || {}).forEach(([key, value]) => {
      if (value === undefined || value === null || value === "") return;
      search.set(key, String(value));
    });
    const query = search.toString();
    return query ? `${path}?${query}` : path;
  }

  function loginPlayer(playerId) {
    return request("/api/auth/login", {
      method: "POST",
      body: JSON.stringify({ playerId }),
    });
  }

  function loginAdmin(password) {
    return request("/api/auth/admin-login", {
      method: "POST",
      body: JSON.stringify({ password }),
    });
  }

  async function logout() {
    const result = await request("/api/auth/logout", { method: "POST" }, true);
    clearStoredTokens();
    return result;
  }

  function getGames(params) {
    return request(withQuery("/api/games", params), { method: "GET" });
  }

  function getApplications() {
    return request("/api/applications", { method: "GET" }, true);
  }

  function submitApplication(payload) {
    return request("/api/applications", {
      method: "POST",
      body: JSON.stringify(payload),
    }, true);
  }

  function cancelApplication(applicationId) {
    return request(`/api/applications/${encodeURIComponent(applicationId)}/cancel`, {
      method: "PUT",
    }, true);
  }

  function getAllApplications(params) {
    return request(withQuery("/api/admin/applications", params), { method: "GET" }, true);
  }

  function updateApplicationStatus(applicationId, status) {
    return request(`/api/admin/applications/${encodeURIComponent(applicationId)}/status`, {
      method: "PUT",
      body: JSON.stringify({ status }),
    }, true);
  }

  function getPlayers() {
    return request("/api/admin/players", { method: "GET" }, true);
  }

  function addPlayer(player) {
    return request("/api/admin/players", {
      method: "POST",
      body: JSON.stringify(player),
    }, true);
  }

  function updatePlayer(playerId, fields) {
    return request(`/api/admin/players/${encodeURIComponent(playerId)}`, {
      method: "PUT",
      body: JSON.stringify(fields),
    }, true);
  }

  function updateDeadline(gameId, deadline) {
    return request(`/api/admin/games/${encodeURIComponent(gameId)}/deadline`, {
      method: "PUT",
      body: JSON.stringify({ deadline }),
    }, true);
  }

  function addGame(game) {
    return request("/api/admin/games", {
      method: "POST",
      body: JSON.stringify(game),
    }, true);
  }

  function updateGame(gameId, fields) {
    return request(`/api/admin/games/${encodeURIComponent(gameId)}`, {
      method: "PUT",
      body: JSON.stringify(fields),
    }, true);
  }

  function deleteGame(gameId) {
    return request(`/api/admin/games/${encodeURIComponent(gameId)}`, {
      method: "DELETE",
    }, true);
  }

  function replaceSeason2627(payload) {
    return request("/api/admin/games/replace-season", {
      method: "POST",
      body: JSON.stringify(payload || {}),
    }, true);
  }

  function getLineStats() {
    return request("/api/admin/line-stats", { method: "GET" }, true);
  }

  function isUnauthorizedResult(result) {
    return !result?.ok && Number(result?.error?.status) === 401;
  }

  window.workerApiClient = {
    get baseUrl() {
      return resolveBaseUrl();
    },
    setBaseUrl(url) {
      const normalized = normalizeBaseUrl(url);
      if (normalized) localStorage.setItem(BASE_URL_STORAGE_KEY, normalized);
      else localStorage.removeItem(BASE_URL_STORAGE_KEY);
      return resolveBaseUrl();
    },
    clearStoredTokens,
    getGames,
    getApplications,
    submitApplication,
    cancelApplication,
    getAllApplications,
    updateApplicationStatus,
    getPlayers,
    addPlayer,
    updatePlayer,
    updateDeadline,
    addGame,
    updateGame,
    deleteGame,
    replaceSeason2627,
    getLineStats,
    loginPlayer,
    loginAdmin,
    logout,
    isUnauthorizedResult,
  };
})();

</script>
<script>
// ─── i18n ───────────────────────────────────────────
const STRINGS = { ja: {}, en: {} };
let lang = localStorage.getItem('ht_lang') || 'ja';
function t(key) { return (STRINGS[lang] && STRINGS[lang][key]) || (STRINGS.ja && STRINGS.ja[key]) || key; }
function applyI18n() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const k = el.getAttribute('data-i18n');
    if (el.tagName === 'INPUT' && el.hasAttribute('placeholder')) el.placeholder = t(k);
    else el.textContent = t(k);
  });
  const btn = document.getElementById('lang-toggle');
  if (btn) btn.textContent = lang === 'ja' ? 'JA / en' : 'ja / EN';
}
function toggleLang() {
  lang = lang === 'ja' ? 'en' : 'ja';
  localStorage.setItem('ht_lang', lang);
  applyI18n();
}

STRINGS.ja = {
  pageTitle: '選手家族チケット申込システム',
  playerTab: '選手ログイン',
  adminTab: '管理者',
  numberLabel: '番号（3桁）',
  numberPlaceholder: '例: 006（選手）　101（スタッフ）',
  loginHint: '選手: 背番号3桁　／　スタッフ: 101〜',
  loginBtn: 'ログイン',
  roleLabel: 'アカウント種別',
  ticketRole: 'チケット担当',
  managerRole: 'チームマネージャー',
  pwLabel: 'パスワード',
  pwPlaceholder: 'パスワードを入力',
  adminLoginBtn: '管理者ログイン',
};
STRINGS.en = {
  pageTitle: 'Player Family Ticket Request System',
  playerTab: 'Player Login',
  adminTab: 'Admin',
  numberLabel: 'ID Number (3 digits)',
  numberPlaceholder: 'e.g. 006 (Player), 101 (Staff)',
  loginHint: 'Players: 3-digit jersey number / Staff: 101 and up',
  loginBtn: 'Login',
  roleLabel: 'Account Type',
  ticketRole: 'Ticket Manager',
  managerRole: 'Team Manager',
  pwLabel: 'Password',
  pwPlaceholder: 'Enter password',
  adminLoginBtn: 'Admin Login',
};
// ────────────────────────────────────────────────────

function switchTab(type) {
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', (i === 0 && type === 'player') || (i === 1 && type === 'admin'));
  });
  document.getElementById('panel-player').classList.toggle('active', type === 'player');
  document.getElementById('panel-admin').classList.toggle('active', type === 'admin');
}

function getLoginErrorMessage(e) {
  if (e.name === 'AbortError') return '通信がタイムアウトしました。再度お試しください';
  if (e.name === 'TypeError') return 'ネットワークエラーが発生しました。再度お試しください';
  return e.message;
}

async function loginPlayer() {
  const playerId = document.getElementById('playerId').value.trim();
  const errEl = document.getElementById('player-error');
  errEl.textContent = '';

  if (!playerId || playerId.length !== 3) { errEl.textContent = '3桁の番号を入力してください'; return; }

  const btn = document.querySelector('#panel-player .btn');
  const originalBtnHtml = btn.innerHTML;
  btn.disabled = true;
  btn.textContent = 'ログイン中...';
  try {
    const result = await workerApiClient.loginPlayer(playerId);
    if (!result.ok) throw new Error(result.error?.message || result.error || 'ログインに失敗しました');
    sessionStorage.setItem('auth', JSON.stringify(result.data));
    window.location.href = 'player-dashboard.html';
  } catch (e) {
    errEl.textContent = getLoginErrorMessage(e) || '番号が見つかりません';
  } finally {
    btn.disabled = false;
    btn.innerHTML = originalBtnHtml;
  }
}

function updateRoleUI() {
  const val = document.querySelector('input[name="adminRole"]:checked').value;
  document.getElementById('role-ticket-label').classList.toggle('selected', val === 'ticket');
  document.getElementById('role-manager-label').classList.toggle('selected', val === 'manager');
}
updateRoleUI();

async function loginAdmin() {
  const pw = document.getElementById('adminPw').value;
  const errEl = document.getElementById('admin-error');
  errEl.textContent = '';
  if (!pw) { errEl.textContent = 'パスワードを入力してください'; return; }

  const btn = document.querySelector('#panel-admin .btn');
  const originalBtnHtml = btn.innerHTML;
  btn.disabled = true;
  btn.textContent = 'ログイン中...';
  try {
    const result = await workerApiClient.loginAdmin(pw);
    if (!result.ok) throw new Error(result.error?.message || result.error || 'ログインに失敗しました');
    sessionStorage.setItem('auth', JSON.stringify(result.data));
    window.location.href = 'admin.html';
  } catch (e) {
    errEl.textContent = getLoginErrorMessage(e) || 'ログインに失敗しました';
  } finally {
    btn.disabled = false;
    btn.innerHTML = originalBtnHtml;
  }
}

// =====================================================
// デモモード（API 未接続時のオフライン動作）
// =====================================================
function demoMode(method, params) {
  if (params.action === 'login') {
    const p = DEMO_MEMBERS.find(p => String(p.playerId) === String(params.playerId));
    if (p) return { ok: true, data: { playerId: p.playerId, name: p.name, role: 'player' } };
    return { ok: false, error: '番号が見つかりません（例: 006, 101）' };
  }
  if (params.action === 'adminLogin') {
    const adminRole = document.querySelector('input[name="adminRole"]:checked').value;
    return { ok: true, data: { role: 'admin', adminRole } };
  }
  return { ok: false, error: 'デモモード: この操作はGAS接続後に利用可能' };
}
