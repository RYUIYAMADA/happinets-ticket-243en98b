name            = "family-tickets-api"
main            = "src/index.js"
compatibility_date = "2026-06-01"

# Observability (デバッグログ出力)
[observability]
enabled = true

# D1 データベース
[[d1_databases]]
binding       = "DB"
database_name = "family-tickets-db"
database_id   = "e0012711-4846-4727-8bc9-2a44d3d66de6"
# D1 リージョン（日本ユーザー向け）
# location_hint は wrangler.toml では設定不可。wrangler d1 create 時に --location=apac を指定する
# wrangler d1 create family-tickets-db --location=apac

# Cron Triggers
# - 毎日 18:00 JST (UTC 09:00): 締切前日アナウンス broadcast + 期限切れ session/state cleanup
#   朝通知（当日試合の選手への push 通知）は廃止済み（2026-06-14 龍偉指示）
[triggers]
crons = ["0 9 * * *"]

# 環境変数（秘密情報は wrangler secret put で設定）
[vars]
ALLOWED_ORIGIN = "https://app-five-pi-50.vercel.app"
# TODO(龍偉): FE の本番 URL が確定後に必要なら上書きする

# secrets（wrangler secret put で設定・ここには書かない）
# LINE_CHANNEL_SECRET
# LINE_CHANNEL_ACCESS_TOKEN
# ADMIN_SALT
# LINE_LOGIN_CHANNEL_ID  ← LIFF認証用 LINEログインチャネルID（数字）
#   設定方法: wrangler secret put LINE_LOGIN_CHANNEL_ID
#   取得場所: LINE Developers Console → LINEログインチャネル → Basic Settings → Channel ID
# GOOGLE_SERVICE_ACCOUNT_KEY （フェーズ5で追加）

# マイグレーションファイル
# wrangler d1 execute family-tickets-db --file=migrations/0001_init.sql
